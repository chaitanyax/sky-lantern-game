<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Sky Lantern Sprint</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel">
        <div class="canvas-shell">
          <!-- Floating UI on top -->
          <div class="hud">
            <div class="hud-card">
              <span class="hud-label">Score</span>
              <strong id="score">0</strong>
            </div>
            <div class="hud-card">
              <span class="hud-label">Best</span>
              <strong id="best">0</strong>
            </div>
            <div class="hud-card">
              <span class="hud-label">Shields</span>
              <strong id="shields">0</strong>
            </div>
            <div class="hud-card">
              <span class="hud-label">Sparks</span>
              <strong id="sparks">0</strong>
            </div>
          </div>

          <canvas id="game" aria-label="Sky Lantern Sprint game area"></canvas>

          <div class="overlay overlay-visible" id="startOverlay">
            <div class="panel-copy">
              <p class="eyebrow">Tap to lift</p>
              <h1>Sky Lantern Sprint</h1>
              <p>
                Guide a tiny lantern spirit through the midnight forest, collect sparks,
                and earn shield bursts. Works with tap, click, or spacebar.
              </p>
              <div class="action-buttons">
                <button id="startButton" class="primary-button">Start Flight</button>
                <button class="secondary-button sound-toggle" type="button">Sound: <span class="sound-state">ON</span></button>
              </div>
            </div>
          </div>

          <div class="overlay" id="gameOverOverlay">
            <div class="panel-copy">
              <p class="eyebrow">The journey pauses</p>
              <h2>Your light joins the night sky.</h2>
              <p id="summary">You banked 0 sparks.</p>
              <div class="action-buttons">
                <button id="restartButton" class="primary-button">Fly Again</button>
                <button class="secondary-button sound-toggle" type="button">Sound: <span class="sound-state">ON</span></button>
              </div>
            </div>
          </div>
        </div>
      </section>


    </main>

    <script src="./app.js"></script>
  </body>
</html>
